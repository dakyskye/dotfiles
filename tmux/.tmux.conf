set-option -g prefix C-a
unbind C-b
bind C-a send-prefix

set-option -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# statusline (onedark, follows macOS theme)
set -g status-left-length 40
set -g window-status-separator ""
if-shell 'uname | grep -q Darwin' {
    set -g status-right-length 90
    if-shell 'defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark' {
        set -g status-style "bg=#282c34,fg=#abb2bf"
        set -g status-left "#[fg=#282c34,bg=#98c379,bold] #S #[fg=#98c379,bg=#282c34] "
        set -g status-right "#{?#{==:#{@passthrough},on},#[fg=#e06c75 bold] PASSTHROUGH,#[fg=#98c379 bold] RECEIVING}#{?window_zoomed_flag, #[fg=#e5c07b bold][Z],} #[fg=#565c64]│ #[fg=#abb2bf]#(pmset -g ps | grep -oE '[0-9]+%%' | head -1) #[fg=#565c64]│ #[fg=#61afef]#H #[fg=#565c64]│ #[fg=#e5c07b]%Y-%m-%d %H:%M "
        set -g window-status-format " #[fg=#565c64]#I #[fg=#abb2bf]#W "
        set -g window-status-current-format " #[fg=#61afef,bold]#I #W "
    } {
        set -g status-style "bg=#e5e5e5,fg=#383a42"
        set -g status-left "#[fg=#e5e5e5,bg=#50a14f,bold] #S #[fg=#50a14f,bg=#e5e5e5] "
        set -g status-right "#{?#{==:#{@passthrough},on},#[fg=#ca1243 bold] PASSTHROUGH,#[fg=#50a14f bold] RECEIVING}#{?window_zoomed_flag, #[fg=#986801 bold][Z],} #[fg=#9e9e9e]│ #[fg=#383a42]#(pmset -g ps | grep -oE '[0-9]+%%' | head -1) #[fg=#9e9e9e]│ #[fg=#0184bc]#H #[fg=#9e9e9e]│ #[fg=#986801]%Y-%m-%d %H:%M "
        set -g window-status-format " #[fg=#9e9e9e]#I #[fg=#383a42]#W "
        set -g window-status-current-format " #[fg=#0184bc,bold]#I #W "
    }
} {
    set -g status-right-length 70
    set -g status-style "bg=#e5e5e5,fg=#383a42"
    set -g status-left "#[fg=#e5e5e5,bg=#50a14f,bold] #S #[fg=#50a14f,bg=#e5e5e5] "
    set -g status-right "#[fg=#0184bc]#H #[fg=#9e9e9e]│ #[fg=#986801]%Y-%m-%d %H:%M "
    set -g window-status-format " #[fg=#9e9e9e]#I #[fg=#383a42]#W "
    set -g window-status-current-format " #[fg=#0184bc,bold]#I #W "
}

bind r source-file ~/.tmux.conf

# passthrough mode — F12 switches the key table so all keys reach the inner tmux
# keys not bound in the active table are sent to the pane, so no per-key management needed
set -g @passthrough off
bind -n F12 {
    set -g @passthrough on
    set -g key-table passthrough
    refresh-client -S
}
bind -T passthrough F12 {
    set -g @passthrough off
    set -g key-table root
    refresh-client -S
}

# pane navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# pane resize
bind -n M-h resize-pane -L 1
bind -n M-j resize-pane -D 1
bind -n M-k resize-pane -U 1
bind -n M-l resize-pane -R 1

bind = select-layout tiled
bind [ swap-window -t -1 \; select-window -t -1
bind ] swap-window -t +1 \; select-window -t +1

# macOS-specific
if-shell 'uname | grep -q Darwin' {
  set -g set-clipboard off
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}
